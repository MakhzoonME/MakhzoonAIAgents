name: AI Agent Task Runner

on:
  repository_dispatch:
    types: [agent-task]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  execute-task:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || true

      - name: Run AI Agent
        id: agent
        env:
          TASK_ID: ${{ github.event.client_payload.taskId }}
          TASK_TITLE: ${{ github.event.client_payload.title }}
          TASK_DESCRIPTION: ${{ github.event.client_payload.description }}
          TASK_ASSIGNEE: ${{ github.event.client_payload.assignee }}
          TASK_PRIORITY: ${{ github.event.client_payload.priority }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER || 'anthropic' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: node scripts/agent-task.js

      - name: Create Pull Request
        id: pr
        if: ${{ !cancelled() }}
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT || github.token }}
          commit-message: "feat: ${{ github.event.client_payload.title }}"
          branch: agent-task/${{ github.event.client_payload.taskId }}
          delete-branch: true
          base: ${{ github.event.client_payload.branch || 'main' }}
          title: "${{ github.event.client_payload.taskId }}: ${{ github.event.client_payload.title }}"
          body: |
            ## AI-Generated Changes

            **Task:** ${{ github.event.client_payload.taskId }}
            **Description:** ${{ github.event.client_payload.description }}
            **Priority:** ${{ github.event.client_payload.priority }}
            **Assigned to:** ${{ github.event.client_payload.assignee }}

            > This PR was automatically generated by the AI Agent Task Runner.
            > Review carefully before merging.
          labels: |
            ai-generated
            ${{ github.event.client_payload.priority == 'high' && 'priority-high' || '' }}
          assignees: ${{ github.event.client_payload.assignee == 'user' && github.actor || '' }}

      - name: Report PR URL
        if: steps.pr.outputs.pull-request-number
        run: |
          echo "PR #${{ steps.pr.outputs.pull-request-number }} created: ${{ steps.pr.outputs.pull-request-url }}"
